<title>SAB Wiki RNG Countdown</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    padding:35px;

    max-width:750px;
    width:90%;

    width:150px;

h1{
    font-family:'Montserrat',sans-serif;

    font-family:'Montserrat',sans-serif;

    margin-top:20px;

<div class="container">

    <img
        class="logo"
        src="https://i.imgur.com/XeQ6eNp.png"
        alt="SAB Wiki RNG Logo"
    >

    <h1>SAB WIKI RNG COUNTDOWN</h1>

    <div id="countdown">Loading...</div>

    <div class="subtitle">
        A countdown to SAB WIKI RNG, made by ayysail.
    </div>

    <a
        class="discord-btn"
        href="https://discord.gg/kqEQTg5NV9"
        target="_blank"
    >

    </a>

    <div class="footer">
        This website is unofficial and is not affiliated with the SAB Wiki RNG development team.
    </div>

</div>

<script>
const targetDate = new Date("June 26, 2026 00:00:00").getTime();

function updateCountdown() {
    const now = new Date().getTime();
    const distance = targetDate - now;

    if (distance <= 0) {
        document.getElementById("countdown").innerHTML =
            "🎉 SAB WIKI RNG COUNTDOWN HAS ENDED!";
        return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor(
        (distance % (1000 * 60 * 60 * 24)) /
        (1000 * 60 * 60)
    );
    const minutes = Math.floor(
        (distance % (1000 * 60 * 60)) /
        (1000 * 60)
    );
    const seconds = Math.floor(
        (distance % (1000 * 60)) /
        1000
    );

    document.getElementById("countdown").innerHTML =
        days + "d " +
        hours + "h " +
        minutes + "m " +
        seconds + "s";
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
